version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: seedofafrica
      POSTGRES_USER: seeduser
      POSTGRES_PASSWORD: seedpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://seeduser:seedpassword@db:5432/seedofafrica
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000

volumes:
  postgres_data:
