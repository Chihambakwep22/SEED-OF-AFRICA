backends:
  - name: seed-of-africa-api
    type: web
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: |
      gunicorn seedofafrica.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "seed-of-africa-api.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: seedofafrica_db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://seed-of-africa-frontend.onrender.com"
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@seedofafrica.com"
      - key: EMAIL_HOST
        value: "smtp.sendgrid.net"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "true"
      - key: EMAIL_HOST_USER
        value: "apikey"
      - key: EMAIL_HOST_PASSWORD
        generateValue: true
    healthCheckPath: /api/health/
    autoDeploy: true

  - name: seed-of-africa-frontend
    type: web
    env: static
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
          - key: X-Frame-Options
            value: DENY
          - key: X-Content-Type-Options
            value: nosniff
          - key: Referrer-Policy
            value: strict-origin-when-cross-origin
    redirects:
      - source: /api/*
        destination: https://seed-of-africa-api.onrender.com/api
        type: 307
      - source: /static/*
        destination: /static/
        type: 200
      - source: /*
        destination: /index.html
        type: 200
    autoDeploy: true

databases:
  - name: seedofafrica_db
    type: postgres
    plan: free
    host: localhost